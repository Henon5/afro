    // ============================================

    const Api = {
      // Get headers with Telegram auth
      _headers() {
        const headers = { 'Content-Type': 'application/json' };
        if (window.Telegram?.WebApp?.initData) {
          headers['x-telegram-init-data'] = Telegram.WebApp.initData;
        }
        return headers;
      },

      // Generic request handler
      async _request(endpoint, options = {}) {
        const url = `${CONFIG.API_BASE}${endpoint}`;
        
        try {
          showLoading(options.loadingText || 'Processing...');
          
          const response = await fetch(url, {
            ...options,
            headers: { ...this._headers(), ...options.headers }
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            throw new Error(data.error || 'Request failed');
          }
          
          return data;
        } catch (error) {
          console.error('API Error:', error);
          showToast(error.message || 'Connection error. Please check your internet.', 'error');
          throw error;
        } finally {
          hideLoading();
        }
      },

      // 🔐 Authentication
      syncUser: () => this._request('/auth/sync', { method: 'POST' }),

      adminLogin: async ({ masterId, secureCode, securityKey }) => {

},

      })
    };

    // ============================================
    // 🔊 SOUND MANAGER
    // ============================================
    const Sound = {
      _ctx: null,
      
      _init() {
        if (this._ctx) return;
        try {
          this._ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log('Audio not supported');
        }
      },
      
      _play(freq, type = 'sine', duration = 0.1, volume = 0.1) {
        this._init();
        if (!this._ctx) return;
        
        try {
          const osc = this._ctx.createOscillator();
          const gain = this._ctx.createGain();
          
          osc.type = type;
          osc.frequency.setValueAtTime(freq, this._ctx.currentTime);
          
          gain.gain.setValueAtTime(volume, this._ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, this._ctx.currentTime + duration);
          
          osc.connect(gain);
          gain.connect(this._ctx.destination);
          
          osc.start();
          osc.stop(this._ctx.currentTime + duration);
        } catch (e) {
          console.log('Audio play error:', e);
        }
      },
      
      click() { this._play(600, 'sine', 0.08, 0.08); },
      number() { this._play(440, 'triangle', 0.15, 0.12); },
      win() {
        this._play(523, 'square', 0.25, 0.15); // C5

    // ============================================

    // ============================================

        showToast('Copied to clipboard!', 'success');

        showToast('Failed to copy', 'error');
      });

    // ============================================
    // 📱 TELEGRAM INTEGRATION
    // ============================================
    function initTelegram() {

        console.warn('Telegram WebApp not available');
        return;

      // Expand to full height
      tg.expand();

    // ============================================
    // 🎮 BINGO GAME PAGE
    // ============================================
    async function renderBingoPage(container) {
      if (AppState.user?.isBlocked) {
        showToast('Account blocked', 'error');
        showPage('lobby');
        return;
      }

      const roomAmount = AppState.user?.selectedRoom || 20;
      AppState.game.roomAmount = roomAmount;

      // Fetch room data
      let poolData = { pool: 0, playersCount: 0 };
      try {
        // In production: fetch from API
        // For now, use optimistic update
      } catch (error) {
        console.warn('Could not fetch room data');
      }

      container.innerHTML = `
        <div class="header">
          <button class="header-btn" onclick="exitGame()">←</button>

        <div class="pool-box">

        <div class="stats-container">

    // ============================================
    // 🎲 GAME LOGIC
    // ============================================
    async function startNewGame() {
      const game = AppState.game;
      game.isGameActive = true;
      
      if (game.autoInterval) clearInterval(game.autoInterval);
      game.calledNumbers = [];
      game.currentNumbers = [];
      game.cardGrid = [];
      game.markedState = [];

      // Reset UI
      if(document.getElementById('callCount')) {
        document.getElementById('callCount').textContent = '0';
      }
      if(document.getElementById('currentNumberDisplay')) {
        document.getElementById('currentNumberDisplay').textContent = 'Ready';
      }
      if(document.getElementById('matchesCount')) {
        document.getElementById('matchesCount').textContent = '0';
      }
      updateNumbersHistory();

      // Generate card (in production: receive from server)
      generateBingoCard();
      renderCard();
      
      // Start auto-play
      startAutoPlay();
    }

    function generateBingoCard() {
      const game = AppState.game;
      
      for(let r = 0; r < 5; r++) {
        game.cardGrid[r] = [];
        game.markedState[r] = [];
      }
      
      ['B','I','N','G','O'].forEach((_, col) => {
        const min = col * 15 + 1;
        let nums = [];
        while(nums.length < 5) {
          let n = Math.floor(Math.random() * 15) + min;
          if(!nums.includes(n)) nums.push(n);
        }
        nums.sort((a,b) => a - b);
        
        for(let r = 0; r < 5; r++) {
          game.cardGrid[r][col] = nums[r];
          game.markedState[r][col] = false;
        }
      });
      
      // Mark FREE space
      game.markedState[2][2] = true;
    }

    function renderCard() {
      const table = document.getElementById('bingoCard');
      if(!table) return;
      
      table.innerHTML = '';
      const game = AppState.game;
      
      // Header row
      const thr = table.insertRow();
      ['B','I','N','G','O'].forEach(letter => {
        let th = document.createElement('th');
        th.textContent = letter;
        thr.appendChild(th);
      });
      
      // Number rows
      for(let r = 0; r < 5; r++) {
        const row = table.insertRow();
        for(let c = 0; c < 5; c++) {
          const cell = row.insertCell();
          
          if(r === 2 && c === 2) {
            // FREE space
            cell.textContent = 'FREE';
            cell.className = 'free marked';
          } else {
            cell.textContent = game.cardGrid[r][c];
            cell.dataset.num = game.cardGrid[r][c];
            cell.dataset.row = r;
            cell.dataset.col = c;
            cell.onclick = () => manualMark(cell, r, c);
          }
        }
      }
    }

    function manualMark(cell, row, col) {
      const game = AppState.game;
      
      if(!game.isGameActive) {
        showToast('Game not active', 'error');
        return;
      }
      
      const num = parseInt(cell.dataset.num);
      
      // Only allow marking if number was called
      if(game.calledNumbers.includes(num)) {
        Sound.click();
        cell.classList.toggle('marked');
        game.markedState[row][col] = cell.classList.contains('marked');
        updateMatchesCount();
      } else {
        showToast('Number not called yet!', 'error');
        Sound.error();
      }
    }

    function updateMatchesCount() {
      const game = AppState.game;
      let count = 0;
      
      for(let r = 0; r < 5; r++) {
        for(let c = 0; c < 5; c++) {
          if(game.markedState[r][c]) count++;
        }
      }
      
      // Subtract 1 for FREE space
      const display = document.getElementById('matchesCount');
      if(display) {
        display.textContent = Math.max(0, count - 1);
      }
    }

    function updateNumbersHistory() {
      const hist = document.getElementById('numbersHistory');
      if(!hist) return;
      
      const game = AppState.game;
      hist.innerHTML = '';
      
      const recent = [...game.currentNumbers].reverse().slice(0, 12);
      
      if(recent.length === 0) {
        hist.innerHTML = '<div style="color:var(--gray); text-align:center; width:100%;">No numbers yet</div>';
        return;
      }
      
      recent.forEach((num, idx) => {
        const badge = document.createElement('div');
        badge.className = 'number-badge';
        if(idx === 0) badge.classList.add('recent');
        
        const letter = ['B','I','N','G','O'][Math.floor((num-1)/15)];
        badge.textContent = `${letter}-${num}`;
        hist.appendChild(badge);
      });
    }

    function startAutoPlay() {
      const game = AppState.game;
      game.isAutoPlaying = true;
      
      // Call first number immediately
      callNumber();
      
      // Then continue at interval
      game.autoInterval = setInterval(callNumber, CONFIG.AUTO_PLAY_INTERVAL);
    }

    function stopAutoPlay() {
      const game = AppState.game;
      game.isAutoPlaying = false;
      if(game.autoInterval) {
        clearInterval(game.autoInterval);
        game.autoInterval = null;
      }
    }

    function callNumber() {
      const game = AppState.game;
      
      if(game.calledNumbers.length >= CONFIG.MAX_CALLED_NUMBERS) {
        stopAutoPlay();
        return;
      }
      
      // Generate unique random number
      let num;
      do {
        num = Math.floor(Math.random() * 75) + 1;
      } while(game.calledNumbers.includes(num));
      
      game.calledNumbers.push(num);
      game.currentNumbers.push(num);
      
      // Play sound
      Sound.number();
      
      // Update display
      const letter = ['B','I','N','G','O'][Math.floor((num-1)/15)];
      const display = document.getElementById('currentNumberDisplay');
      if(display) {
        display.textContent = `${letter}-${num}`;
        // Add animation
        display.style.animation = 'none';
        setTimeout(() => {
          display.style.animation = 'pulse 0.3s ease';
        }, 10);
      }
      
      // Highlight on card if present
      const cell = document.querySelector(`td[data-num="${num}"]`);
      if(cell) {
        cell.classList.add('called');
        setTimeout(() => {
          if(cell) cell.classList.remove('called');
        }, 1500);
      }
      
      // Update history
      updateNumbersHistory();
      
      // Check for auto-win (server should validate)
      checkForBingo();
    }

    function checkForBingo() {
      const game = AppState.game;
      let won = false;
      
      // Check rows
      for(let i = 0; i < 5; i++) {
        if(game.markedState[i].every(v => v)) won = true;
      }
      
      // Check columns
      for(let i = 0; i < 5; i++) {
        let colComplete = true;
        for(let j = 0; j < 5; j++) {
          if(!game.markedState[j][i]) colComplete = false;
        }
        if(colComplete) won = true;
      }
      
      // Check diagonals
      let d1 = true, d2 = true;
      for(let i = 0; i < 5; i++) {
        if(!game.markedState[i][i]) d1 = false;
        if(!game.markedState[i][4-i]) d2 = false;
      }
      if(d1 || d2) won = true;
      
      if(won) {
        handleWin();
      }
    }

    async function handleWin() {
      const game = AppState.game;
      stopAutoPlay();
      
      // Play win sound & confetti
      Sound.win();
      confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 },
        colors: ['#009b3a', '#fed105', '#ef3340']
      });
      
      // In production: call server to claim win
      try {
        const response = await Api.claimBingo({
          cardMarked: game.markedState,
          calledNumbers: game.calledNumbers
        });
        
        // Show winner announcement
        showWinnerAnnouncement(AppState.user?.name || 'Player', response.winnings);
        
        // Update user data
        if(response.newBalance !== undefined) {
          AppState.user.balance = response.newBalance;
        }
        
        showToast(`🎉 You won ${response.winnings} ETB!`, 'success');
        
        // Return to lobby after delay
        setTimeout(() => {
          showPage('lobby');
        }, 4000);
        
      } catch (error) {
        // Fallback: local win handling (not secure, for demo only)
        const roomAmount = game.roomAmount || 20;
        const winnings = Math.floor(roomAmount * 0.85 * 5); // Demo calculation
        
        showWinnerAnnouncement(AppState.user?.name || 'Player', winnings);
        showToast(`🎉 You won ${winnings} ETB!`, 'success');
        
        setTimeout(() => {
          showPage('lobby');
        }, 4000);
      }
    }

    async function tryJoinRoom(amount) {
      if(!AppState.user) {
        // Sync user first
        try {
          const response = await Api.syncUser();
          AppState.user = response.user;
        } catch (error) {
          showToast('Please restart the app', 'error');
          return;
        }
      }
      
      if(AppState.user.isBlocked) {
        showToast('Account blocked', 'error');
        return;
      }
      
      if(AppState.user.balance < amount) {
        showToast(`Insufficient balance! Need ${amount} ETB.`, 'error');
        Sound.error();
        
        // Offer to deposit
        if(confirm('Would you like to deposit funds now?')) {
          showPage('deposit');
        }
        return;
      }
      
      await joinRoom(amount);
    }

    async function joinRoom(amount) {
      try {
        const response = await Api.joinRoom(amount);
        
        // Update local state
        AppState.user.balance = response.userBalance;
        AppState.game.roomAmount = amount;
        
        showToast(response.message, 'success');
        Sound.success();
        
        // Start game with server-provided card if available
        if(response.card) {
          AppState.game.cardGrid = response.card.grid;
          AppState.game.markedState = response.card.marked;
        }
        
        showPage('bingo');
      } catch (error) {
        // Error already shown by API layer
      }
    }
